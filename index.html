<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World — Architect Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0D0D0D;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }
    .container { text-align: center; }
    h1 {
      color: #C9A84C;
      font-size: 64px;
      font-weight: bold;
      letter-spacing: 4px;
      animation: fadeIn 1.5s ease-in-out;
    }
    p {
      color: #F0EEE9;
      font-size: 20px;
      margin-top: 16px;
      font-style: italic;
      animation: fadeIn 2s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hello World</h1>
    <p>"My Vibe" Travel AI — Architect Test Deploy</p>
  </div>
</body>
</html>
